name: 🚀 Deploy (staging)
on:
  push:
    tags:
      - stage
    branches:
      - dev
    paths-ignore:
      - ".vscode/**"
      - "scripts/**"
      - "README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    name: ⚡ Remix Test
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: 📥 Install deps
        run: pnpm install --frozen-lockfile

      - name: 🎭 Install Playwright browsers
        run: pnpm run test:install-browsers

      - name: ⚡ Run Remix tests
        run: pnpm run test
        env:
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🎈 Setup Fly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          flyctl_url="$(
            curl --fail --silent --show-error --location --retry 5 \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              https://api.github.com/repos/superfly/flyctl/releases/latest \
              | python3 -c 'import json, sys; print(next(asset["browser_download_url"] for asset in json.load(sys.stdin)["assets"] if asset["name"].endswith("_Linux_x86_64.tar.gz")))'
          )"

          curl --fail --silent --show-error --location --retry 5 \
            --output "$tmp_dir/flyctl.tar.gz" \
            "$flyctl_url"
          tar -xzf "$tmp_dir/flyctl.tar.gz" -C "$tmp_dir"
          sudo install "$tmp_dir/flyctl" /usr/local/bin/flyctl
          flyctl version

      - name: 🚀 Deploy Staging
        run: flyctl deploy --remote-only --config ./fly.staging.toml --strategy bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
